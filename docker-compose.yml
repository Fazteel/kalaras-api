version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: kalaesok_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: kalaesok_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
  # waha:
  #   image: devopsilo/waha:latest
  #   container_name: kalaesok_waha
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - WAHA_PRINT_QR=true
  #   restart: always

volumes:
  redis_data:
  minio_data:
